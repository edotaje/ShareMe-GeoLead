services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    volumes:
      - /mnt/storage/geolead/lists:/app/data/lists
    expose:
      - "8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "69:80"
    depends_on:
      - backend
