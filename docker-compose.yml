services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - lists_data:/app/data/lists
    expose:
      - "8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  lists_data:
