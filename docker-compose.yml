services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    volumes:
      - ${LISTS_HOST_PATH:-./backend/data/lists}:/app/data/lists
    expose:
      - "8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8069:80"
    depends_on:
      - backend
